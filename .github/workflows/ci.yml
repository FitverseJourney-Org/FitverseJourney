name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    # Usar Ubuntu garante um ambiente limpo e padronizado toda vez
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # O cache evita baixar as dependências do Gradle toda vez (mais rápido!)
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Build and Tests
        run: |
          mkdir -p ${{ github.workspace }}/gradle-temp
          ./gradlew build --info --stacktrace -Djava.io.tmpdir=${{ github.workspace }}/gradle-temp
