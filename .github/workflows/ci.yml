name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > androidApp/google-services.json
          mkdir -p androidApp/src/debug
          mkdir -p androidApp/src/release
          cp androidApp/google-services.json androidApp/src/debug/google-services.json
          cp androidApp/google-services.json androidApp/src/release/google-services.json

      - name: Run Build
        run: |
          # Criamos a pasta usando o caminho absoluto do GitHub Workspace
          mkdir -p ${{ github.workspace }}/runner-temp
          
          # Removemos o 'test' e mantivemos o assembleDebug para validar a compilação
          ./gradlew assembleDebug \
            --info --stacktrace \
            -Djava.io.tmpdir=${{ github.workspace }}/runner-temp \
            --no-configuration-cache \
            --no-daemon